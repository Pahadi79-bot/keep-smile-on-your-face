<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Always be Happy Aarushi ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  overflow: hidden;
}

/* Buttons */
button {
  margin: 10px;
  padding: 12px 18px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

#yes {
  background: #28a745;
  color: white;
}

/* 🐰 Bunny NO Button */
#no {
  position: absolute;
  background: #fff;
  color: #ff4d6d;
  font-size: 14px;
  border-radius: 50px;
  padding: 12px 20px;
  border: 2px solid #ff4d6d;
}

#no::before {
  content: "🐰";
  margin-right: 6px;
}

/* Popup */
#popup {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

/* ✨ Glow animation */
@keyframes glow {
  0% { text-shadow: 0 0 10px #fff; }
  50% { text-shadow: 0 0 25px #ff4d6d, 0 0 40px #ff7eb3; }
  100% { text-shadow: 0 0 10px #fff; }
}

/* Cinematic */
#cinematic {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  color:white;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:1001;
  font-size:32px;
  opacity:0;
  transition: opacity 2s;
  animation: glow 2s infinite;
}

/* Ending */
#ending {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  color:white;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:1003;
  font-size:22px;
  opacity:0;
  transition: opacity 2s;
}

/* Video */
#videoPlayer {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1002;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="Teri Muskurahat Hai Takat Meri.mp3" type="audio/mpeg">
</audio>

<h2 style="color:white;">I always want to see you happy 😊❤️</h2>
<p id="typing" style="color:white;"></p>

<button id="yes" onclick="forgive()">Make promise to always keep cute smile 😊❤️</button>
<button id="no" onmouseover="moveButton()" ontouchstart="moveButton()">NO 💔</button>

<p style="color:white">(Tap to start music)</p>

<!-- Popup -->
<div id="popup">
  <h2>Thanks Aarushi ❤️</h2>
  <button onclick="startFinal()">Tap here it's a message from my heart to you 💌</button>
</div>

<!-- Cinematic -->
<div id="cinematic">
  <div>Aarushi ❤️</div>
</div>

<!-- Video -->
<video id="videoPlayer" playsinline controls>
  <source src="video.mp4" type="video/mp4">
</video>

<!-- Ending -->
<div id="ending">
  <div>I miss you alot ❤️‍🩹<br>plz jaldi se pehle jaisi ho jao 🥺</div>
</div>

<script>
let started=false;

document.body.addEventListener("click", ()=>{
 if(started) return;
 started=true;

 let m=bgMusic;
 m.volume=0;
 m.play();

 let v=0;
 let fade=setInterval(()=>{
   if(v<1){v+=0.05; m.volume=v;}
   else clearInterval(fade);
 },200);

 setTimeout(typeLine,500);
},{once:true});

// typing
let lines=[
"Aarushi, I don't know what is going on with you...",
"But I will always be with you ❤️",
"You mean everything to me 💖",
"Please stay happy 😊",
"If agree tap on promise button 👉🏻",
"If disagree tap on NO, but it also hurt me alot 💔",
"Ek baat to btana bhul hi gya NO ka option hai hi nhi🤭"
];

let i=0,j=0;
function typeLine(){
 if(i<lines.length){
  if(j<lines[i].length){
    typing.innerHTML+=lines[i][j++];
    setTimeout(typeLine,40);
  }else{
    typing.innerHTML+="<br><br>";
    i++; j=0;
    setTimeout(typeLine,800);
  }
 }
}

// explosion
function createExplosion(){
 for(let k=0;k<40;k++){
  let h=document.createElement("div");
  h.innerHTML="💖";
  h.style.position="fixed";
  h.style.left="50%";
  h.style.top="50%";
  document.body.appendChild(h);

  let a=Math.random()*2*Math.PI;
  let d=Math.random()*200+100;
  let x=Math.cos(a)*d;
  let y=Math.sin(a)*d;

  h.animate([
    {transform:"translate(-50%,-50%)",opacity:1},
    {transform:`translate(${x}px,${y}px)`,opacity:0}
  ],{duration:1000});

  setTimeout(()=>h.remove(),1000);
 }
}

function forgive(){
 createExplosion();
 setTimeout(()=>popup.style.display="flex",700);
}

// cinematic transition
function startFinal(){
 popup.style.display="none";

 let m=bgMusic;

 let fade=setInterval(()=>{
   if(m.volume>0){m.volume-=0.05;}
   else{clearInterval(fade); m.pause();}
 },150);

 let c=cinematic;
 c.style.display="flex";

 setTimeout(()=>c.style.opacity=1,100);
 setTimeout(()=>c.style.opacity=0,2500);

 setTimeout(()=>{
   c.style.display="none";
   playVideo();
 },4000);
}

// play video
function playVideo(){
 let v=videoPlayer;
 v.style.display="block";
 v.style.opacity=0;
 v.play();

 let op=0;
 let fade=setInterval(()=>{
   if(op<1){op+=0.05; v.style.opacity=op;}
   else clearInterval(fade);
 },100);

 v.onended = showEnding;
}

// ending
function showEnding(){
 videoPlayer.style.display="none";
 let e=ending;
 e.style.display="flex";
 setTimeout(()=>e.style.opacity=1,100);
}

// moving bunny button
function moveButton(){
 no.style.left=Math.random()*300+"px";
 no.style.top=Math.random()*400+"px";
}
</script>

</body>
</html>
