<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Always be Happy Aarushi ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  overflow: hidden;
}

.container {
  padding: 20px;
  margin-top: 40px;
}

h1 {
  color: white;
}

#typing {
  color: white;
  font-size: 16px;
  border-right: 2px solid white;
}

/* Buttons */
button {
  margin: 10px;
  padding: 12px 18px;
  border-radius: 20px;
  border: none;
}

#yes { background: green; color: white; }
#no { background: red; color: white; position: absolute; }

/* Popup */
#popup {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

/* Cinematic screen */
#cinematic {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  color:white;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:1001;
  font-size:28px;
  opacity:0;
  transition: opacity 2s;
}

/* Video */
#videoPlayer {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1002;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="Teri Muskurahat Hai Takat Meri.mp3" type="audio/mpeg">
</audio>

<div class="container">
<h1>I always want to see you happy 😊❤️</h1>
<p id="typing"></p>

<button onclick="forgive()">Make promise 😊❤️</button>
<button id="no" onmouseover="moveButton()" ontouchstart="moveButton()">NO 😢</button>

<p style="color:white">(Tap to start music)</p>
</div>

<!-- Popup -->
<div id="popup">
  <h2>Thanks Aarushi ❤️</h2>
  <button onclick="startFinal()">Are you ready for next surprise? 💖</button>
</div>

<!-- Cinematic -->
<div id="cinematic">
  <div>Aarushi ❤️</div>
</div>

<!-- Video -->
<video id="videoPlayer" playsinline controls>
  <source src="video.mp4" type="video/mp4">
</video>

<script>
let started=false;

document.body.addEventListener("click", ()=>{
  if(started) return;
  started=true;

  let m=document.getElementById("bgMusic");
  m.volume=0;
  m.play();

  let v=0;
  let fade=setInterval(()=>{
    if(v<1){v+=0.05; m.volume=v;}
    else clearInterval(fade);
  },200);

  setTimeout(typeLine,500);
},{once:true});

// typing
let lines=[
"Aarushi, I don't know what is going on with you...",
"But I will always be with you ❤️",
"You mean everything to me 💖",
"Please stay happy 😊",
"If agree tap on promise button 👉🏻",
"If disagree tap on NO 💔",
"But ek baat to btana bhool hi gya NO ka option hai hi nhi"
];

let i=0,j=0;
function typeLine(){
 if(i<lines.length){
  if(j<lines[i].length){
    typing.innerHTML+=lines[i][j++];
    setTimeout(typeLine,40);
  }else{
    typing.innerHTML+="<br><br>";
    i++; j=0;
    setTimeout(typeLine,800);
  }
 }
}

// explosion
function createExplosion(){
 for(let k=0;k<40;k++){
  let h=document.createElement("div");
  h.innerHTML="💖";
  h.style.position="fixed";
  h.style.left="50%";
  h.style.top="50%";
  document.body.appendChild(h);

  let a=Math.random()*2*Math.PI;
  let d=Math.random()*200+100;
  let x=Math.cos(a)*d;
  let y=Math.sin(a)*d;

  h.animate([
    {transform:"translate(-50%,-50%)",opacity:1},
    {transform:`translate(${x}px,${y}px)`,opacity:0}
  ],{duration:1000});

  setTimeout(()=>h.remove(),1000);
 }
}

function forgive(){
 createExplosion();
 setTimeout(()=>{
  popup.style.display="flex";
 },700);
}

// final cinematic
function startFinal(){
 popup.style.display="none";

 let m=document.getElementById("bgMusic");

 // fade out music
 let fade=setInterval(()=>{
  if(m.volume>0){
    m.volume-=0.05;
  }else{
    clearInterval(fade);
    m.pause();
  }
 },200);

 let c=document.getElementById("cinematic");
 c.style.display="flex";

 setTimeout(()=>{c.style.opacity=1;},100);

 setTimeout(()=>{
  c.style.opacity=0;
 },2500);

 setTimeout(()=>{
  c.style.display="none";
  playVideo();
 },4000);
}

// play video
function playVideo(){
 let v=document.getElementById("videoPlayer");
 v.style.display="block";
 v.play();
}

// moving button
function moveButton(){
 let b=document.getElementById("no");
 b.style.left=Math.random()*300+"px";
 b.style.top=Math.random()*400+"px";
}
</script>

</body>
</html>
